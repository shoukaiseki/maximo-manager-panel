# p6spy 配置 - SQL 日志打印
# 日志输出格式: SingleLineFormat(单行) / MultiLineFormat(多行)
logMessageFormat=com.p6spy.engine.spy.appender.SingleLineFormat

# 使用 StdoutLogger 输出到标准输出（会被 Solon 控制台日志捕获）
appender=com.p6spy.engine.spy.appender.StdoutLogger

# 不打印这些类别的日志（减少噪音）
excludecategories=debug,info,result,resultset,batch

# 慢 SQL 检测（超过 200ms 的 SQL 会额外打印警告）
outagedetection=true
outagedetectioninterval=200
